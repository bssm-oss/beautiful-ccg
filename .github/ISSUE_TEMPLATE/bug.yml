name: Bug Report
description: Report a bug in bccg
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `bccg run --adapter copilot "hello"`
        2. See error: ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide the following information.
      value: |
        - OS:
        - Node.js version:
        - bccg version:
        - Installed CLIs (from `bccg status`):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant error output or logs.
      render: shell

  - type: dropdown
    id: adapter
    attributes:
      label: Affected Adapter
      options:
        - copilot
        - claude
        - codex
        - gemini
        - core / routing
        - mcp-server
        - cli
        - unknown
    validations:
      required: false
